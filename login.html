<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入｜明前知行</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <nav>
        <div class="logo">
            <h1>
                <a href="index.html">
                    <span class="logo-mark">
                            <img src="./icon/logo-mark拷貝2.png" alt="" aria-hidden="true">
                            <span class="logo-text">明前知行</span>
                        </span>
                </a>
            </h1>
        </div>
        <ul class="links">
            <li><a href="market.html">查行情</a></li>
            <li><a href="appointments.html">我的預約</a></li>
            <li><a href="vehicle.html">車庫</a></li>
            <li><a href="index.html">首頁</a></li>
        </ul>
                <button type="button" class="nav-toggle" aria-expanded="false" aria-label="開啟選單">
                <svg class="icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="4" y1="6" x2="20" y2="6"/>
                    <line x1="4" y1="12" x2="20" y2="12"/>
                    <line x1="4" y1="18" x2="20" y2="18"/>
                </svg>
                <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="6" y1="6" x2="18" y2="18"/>
                    <line x1="18" y1="6" x2="6" y2="18"/>
                </svg>
            </button>
        </nav>

    <div class="login-bg">
        <main class="login-main">

            <img src="./icon/logo-mark拷貝2.png" alt="明前知行" class="logo-big">

            <h2 class="page-title">車主登入</h2>
            <p class="page-sub">建立專屬車歷，從這裡開始</p>

            <form class="login-card" autocomplete="off" onsubmit="event.preventDefault()">

                <div class="tabs">
                    <button type="button" class="tab is-active" data-tab="email">EMAIL</button>
                    <button type="button" class="tab" data-tab="phone">手機</button>
                </div>

                <button type="button" class="btn-oauth" id="oauth-btn">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    使用 Google 繼續
                </button>

                <div class="divider"><span>或</span></div>

                <div class="fld" id="fld-email">
                    <input type="email" id="email" placeholder=" " required>
                    <label for="email">Email</label>
                </div>

                <div class="fld-forgot">
                    <a href="#" class="forgot">忘記密碼？</a>
                </div>

                <div class="fld phone is-hidden" id="fld-phone">
                    <span class="phone-prefix">+886</span>
                    <input type="tel" id="phone" placeholder=" ">
                    <label for="phone">手機號碼</label>
                </div>

                <div class="fld">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">密碼</label>
                    <button type="button" class="eye" id="eye-toggle" aria-label="顯示密碼">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="eye-closed">
                            <path d="M3 3l18 18"/>
                            <path d="M10.585 10.587a2 2 0 0 0 2.829 2.828"/>
                            <path d="M16.681 16.673a8.717 8.717 0 0 1-4.681 1.327c-3.6 0-6.6-2-9-6 1.272-2.12 2.712-3.678 4.32-4.674m2.86-1.146a9.055 9.055 0 0 1 1.82-.18c3.6 0 6.6 2 9 6-.666 1.11-1.379 2.067-2.138 2.87"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="eye-open" class="is-hidden">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <label class="remember">
                    <input type="checkbox">
                    <span>記住我</span>
                </label>

                <button type="submit" class="btn-submit">登入</button>
            </form>

            <p class="signup-prompt">還沒有帳號？<a href="#">立即註冊</a></p>

            <div class="role-switch">
                <a href="shop-login.html">我是車行 →</a>
            </div>

            <p class="legal">
                登入即表示同意 <a href="#">服務條款</a> · <a href="#">隱私政策</a>
            </p>

        </main>
    </div>

    <footer>
        <p>© 2026 明前知行　版權所有</p>
        <a href="mailto:992319@gmail.com">992319@gmail.com</a>
    </footer>

    <script src="login.js"></script>
<script src="nav.js"></script>
</body>
</html>
