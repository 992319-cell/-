<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增工單</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="ticket.css">
</head>
<body>
    <div class="wrap">
        <nav>
            <div class="logo">
                <h1>
                    <a href="history.html">
                        <svg width="112" height="32" viewBox="0 0 112 32" fill="none" class="svg-logo-text">
                            <line x1="4" y1="8" x2="20" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="20" y1="8" x2="4" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="12" cy="16" r="2.5" fill="currentColor"/>
                            <text x="32" y="21" font-family="'Noto Serif TC', serif" font-size="13" font-weight="500" letter-spacing="3" fill="currentColor">明前知行</text>
                        </svg>
                    </a>
                </h1>
            </div>
            <ul class="links">
                <li><a href="market.html">查行情</a></li>
                <li class="is-current"><a href="history.html">車歷</a></li>
                <li><a href="login.html">登入</a></li>
            </ul>
        </nav>
        <div class="ticket-header">
            <h2>新增工單</h2>
            <div class="ticket-entry">
                <button type="button" class="ticket-entry-card active">
                    <img src="./icon/pencil-plus.png" alt="pencil.icon">
                    <p>手動填寫</p>
                </button>
                <button type="button" class="ticket-entry-card">
                    <img src="./icon/camera-plus.png" alt="camera.icon">
                    <p>拍照上傳</p>
                </button>
            </div>
        </div>
        <div class="ticket-content">
            <div class="ticket-steps">
                <div class="ticket-step active">
                    <div class="ticket-step-num">1</div>
                    <p>基本資料</p>
                </div>
                <div class="ticket-step">
                    <div class="ticket-step-num">2</div>
                    <p>保養項目</p>
                </div>
                <div class="ticket-step">
                    <div class="ticket-step-num">3</div>
                    <p>確認送出</p>
                </div>
            </div>
            <form action="" class="ticket-form">
                <div class="ticket-field">
                    <p class="ticket-field-label">機車</p>
                    <p class="ticket-vehicle">狗熊</p>
                    <!-- <input type="hidden" name="vehicle_id" value="xyz-5678"> -->
                </div>
                <div class="ticket-field-row">
                    <div class="ticket-field">
                        <label for="date">日期</label>
                        <input type="date" name="date" id="date" required>
                    </div>
                    <div class="ticket-field">
                        <label for="mileage">里程</label>
                        <input type="number" name="mileage" id="mileage" min="0" required>
                    </div>
                </div>
                <div class="ticket-field">
                    <label for="shop-type">店型</label>
                    <select name="shop_type" id="shop-type" required>
                        <option value="">請選擇</option>
                        <option value="general">一般車行（個人/在地）</option>
                        <option value="chain">連鎖店</option>
                        <option value="official">原廠</option>
                    </select>
                </div>
                <div class="ticket-field ticket-field-hidden">
                    <label for="shop-name">保養廠名稱</label>
                    <input type="text" name="shop_name" id="shop-name" required>
                </div>
                <div class="ticket-field">
                    <label for="city">城市</label>
                    <select name="city" id="city" required>
                        <option value="">請選擇</option>
                        <option value="taipei">台北市</option>
                        <option value="newtaipei">新北市</option>
                        <option value="taichung">台中市</option>
                        <option value="tainan">台南市</option>
                        <option value="kaohsiung">高雄市</option>
                    </select>
                </div>
                <div class="ticket-actions">
                    <button type="button" class="btn-primary">
                        下一步
                    </button>
                </div>
            </form>
        </div>
        <footer>
            <p>© 2026 明前知行　版權所有</p>
            <a href="mailto:992319@gmail.com">992319@gmail.com</a>
        </footer>
    </div>
</body>
</html>
