<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車行登入</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="shop-login.css">
</head>
<body>
    <nav>
        <div class="logo">
            <h1>
                <a href="index.html">
                    <svg width="112" height="32" viewBox="0 0 112 32" fill="none" class="svg-logo-text">
                        <line x1="4" y1="8" x2="20" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="20" y1="8" x2="4" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="12" cy="16" r="2.5" fill="currentColor"/>
                        <text x="32" y="21" font-family="'Noto Serif TC', serif" font-size="13" font-weight="500" letter-spacing="3" fill="currentColor">明前知行</text>
                    </svg>
                </a>
            </h1>
        </div>
        <ul class="links">
            <li><a href="market.html">查行情</a></li>
            <li><a href="vehicle.html">車庫</a></li>
            <li><a href="index.html">首頁</a></li>
        </ul>
    </nav>

    <div class="login-bg">
        <main class="login-main">

            <img src="./icon/logo-mark拷貝2.png" alt="明前知行" class="logo-big">

            <h2 class="page-title">車行登入</h2>
            <p class="page-sub">讓每張工單，成為你的招牌</p>

            <form class="login-card" autocomplete="off" onsubmit="event.preventDefault()">

                <div class="fld">
                    <input type="text" id="account" placeholder=" " required>
                    <label for="account">車行帳號</label>
                </div>

                <div class="fld">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">密碼</label>
                    <button type="button" class="eye" id="eye-toggle" aria-label="顯示密碼">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="eye-closed">
                            <path d="M3 3l18 18"/>
                            <path d="M10.585 10.587a2 2 0 0 0 2.829 2.828"/>
                            <path d="M16.681 16.673a8.717 8.717 0 0 1-4.681 1.327c-3.6 0-6.6-2-9-6 1.272-2.12 2.712-3.678 4.32-4.674m2.86-1.146a9.055 9.055 0 0 1 1.82-.18c3.6 0 6.6 2 9 6-.666 1.11-1.379 2.067-2.138 2.87"/>
                        </svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="eye-open" class="is-hidden">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>

                <div class="forgot">
                    <a href="#">忘記密碼？</a>
                </div>

                <label class="remember">
                    <input type="checkbox">
                    <span>記住我</span>
                </label>

                <a href="shop-dashboard.html" class="btn-submit">登入後台</a>
            </form>

            <p class="signup-prompt">尚未開通車行帳號？<a href="#">申請加入</a></p>

            <div class="role-switch">
                <a href="login.html">我是車主 →</a>
            </div>

            <p class="legal">
                登入即表示同意 <a href="#">服務條款</a> · <a href="#">隱私政策</a>
            </p>

        </main>
    </div>

    <footer>
        <p>© 2026 明前知行　版權所有</p>
        <a href="mailto:992319@gmail.com">992319@gmail.com</a>
    </footer>

    <script src="shop-login.js"></script>
</body>
</html>
