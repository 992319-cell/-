<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車庫　明前知行</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="vehicle.css">
</head>
<body>

<nav>
    <div class="logo">
        <h1>
            <a href="index.html">
                <span class="logo-mark">
                    <img src="./icon/logo-mark拷貝2.png" alt="" aria-hidden="true">
                    <span class="logo-text">明前知行</span>
                </span>
            </a>
        </h1>
    </div>
    <ul class="links">
        <li><a href="market.html">查行情</a></li>
        <li><a href="appointments.html">我的預約</a></li>
        <li class="is-current"><a href="vehicle.html">車庫</a></li>
        <li><a href="login.html">登入</a></li>
    </ul>
    <button type="button" class="nav-toggle" aria-expanded="false" aria-label="開啟選單">
        <svg class="icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
        <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="6" y1="6" x2="18" y2="18"/>
            <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
    </button>
</nav>

<main class="veh">

    <div class="veh-head">
        <div class="veh-head-titles">
            <h1>我的車庫</h1>
            <p id="veh-summary" class="veh-summary">共 0 台</p>
        </div>
        <button type="button" id="veh-add-btn" class="veh-add">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增車輛
        </button>
    </div>

    <section id="veh-grid" class="veh-grid" aria-label="車輛清單"></section>

    <p id="veh-empty" class="veh-empty" hidden>
        車庫還沒有車輛　點右上「新增車輛」加入第一台
    </p>

</main>

<footer>
    <p>© 2026 明前知行　版權所有</p>

</footer>

<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="vehicle.js"></script>
</body>
</html>
