<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁｜光陽機車行</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="shop-app.css">
    <link rel="stylesheet" href="shop-dashboard.css">
</head>
<body class="shop-app shop-dashboard">

    <!-- ───────── 側欄 ───────── -->
    <button type="button" class="sidebar-burger" id="sidebar-burger" aria-label="開啟側欄" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="6" y1="6" x2="18" y2="18"/>
            <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
    </button>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <aside class="sidebar" id="sidebar">
        <a class="sidebar-brand" href="shop-dashboard.html" aria-label="返回首頁">
            <img src="./icon/logo-mark拷貝2.png" alt="" aria-hidden="true">
            <span>明前知行</span>
        </a>

        <div class="sidebar-account">
            <button type="button" class="sidebar-shop-btn" id="sidebar-shop-btn" aria-haspopup="menu" aria-expanded="false" aria-controls="sidebar-shop-menu" data-tooltip="光陽機車行">
                <span>光</span>
                <span>光陽機車行</span>
            </button>
            <div class="sidebar-shop-menu" id="sidebar-shop-menu" role="menu" hidden>
                <a role="menuitem" href="#switch">切換店家</a>
                <a role="menuitem" href="#account">帳號設定</a>
                <a role="menuitem" href="#help">說明中心</a>
                <a role="menuitem" href="#notif-settings">通知設定</a>
                <hr>
                <a role="menuitem" href="#logout">登出</a>
            </div>
        </div>

        <button type="button" class="sidebar-walkin" id="sidebar-walkin" data-tooltip="新增現場工單">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>新增現場工單</span>
        </button>

        <small>管理</small>

        <div class="sidebar-nav">
            <a href="shop-dashboard.html" class="is-active" data-tooltip="首頁">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 12l9-9 9 9"/>
                    <path d="M5 10v11h14V10"/>
                </svg>
                <span>首頁</span>
            </a>
            <a href="shop-orders.html" data-tooltip="工單管理">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 3v4a1 1 0 0 0 1 1h4"/>
                    <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"/>
                    <line x1="9" y1="13" x2="15" y2="13"/>
                    <line x1="9" y1="17" x2="13" y2="17"/>
                </svg>
                <span>工單管理</span>
            </a>
        </div>

        <div class="sidebar-bottom">
            <label class="sidebar-open-toggle" data-tooltip="營業狀態">
                <input type="checkbox" id="shop-open-toggle" checked>
                <span>營業中</span>
            </label>
        </div>
    </aside>

    <!-- ───────── 主內容區 ───────── -->
    <main class="app-main">
        <div class="app-topbar">
            <button type="button" class="icon-btn" aria-label="搜尋">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
            <button type="button" class="icon-btn has-alert" aria-label="通知　有未讀訊息">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </button>
        </div>

        <div class="page-head">
            <h1 id="greeting">午安　光陽機車行</h1>
            <p id="today-date">2026 / 06 / 25　週三</p>
        </div>

        <div class="app-body">

            <!-- 需要你關注 -->
            <section class="actions" aria-labelledby="actions-label">
                <h2 id="actions-label">需要你關注</h2>
                <a href="shop-orders.html?tab=pending" data-tone="hot">
                    <h3>待你接單</h3>
                    <strong><span id="pending-count">3</span> 筆</strong>
                    <p>線上預約</p>
                    <small id="pending-earliest">最早一筆　06 / 25　10:00</small>
                    <em>處理 →</em>
                </a>
                <a href="shop-orders.html?tab=in_progress" data-tone="warn">
                    <h3>即將到時</h3>
                    <strong><span id="upcoming-count">1</span> 筆</strong>
                    <p>預約　1 小時內</p>
                    <small id="upcoming-detail">ABC-1234　13:00 報到</small>
                    <em>查看 →</em>
                </a>
            </section>

            <!-- 本月概覽 -->
            <section class="kpi" aria-labelledby="kpi-label">
                <h2 id="kpi-label">本月概覽</h2>
                <article>
                    <h3>本月工單數 <button type="button" aria-label="說明" data-tip="本月已建立的工單總數　包含進行中與已完成">ⓘ</button></h3>
                    <strong>47</strong>
                    <p><span data-trend="up">↑ 12%</span><span>vs 上月</span></p>
                </article>
                <article>
                    <h3>平均客單金額 <button type="button" aria-label="說明" data-tip="本月已完成工單　總金額 ÷ 筆數">ⓘ</button></h3>
                    <strong>$845</strong>
                    <p><span data-trend="up">↑ 5%</span><span>vs 上月</span></p>
                </article>
                <article>
                    <h3>回頭率　90 天 <button type="button" aria-label="說明" data-tip="最近 90 天內二次以上回廠的車主數 ÷ 總車主數">ⓘ</button></h3>
                    <strong>68%</strong>
                    <p><span data-trend="down">↓ 2%</span><span>vs 上月</span></p>
                </article>
            </section>

            <!-- 營收趨勢 -->
            <section class="revenue" aria-labelledby="revenue-label">
                <header>
                    <h2 id="revenue-label">營收趨勢　最近 30 天</h2>
                    <strong>$39,712</strong>
                </header>
                <div class="trend-chart-wrap">
                    <canvas id="trend-chart"></canvas>
                </div>
            </section>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="trend-chart.js"></script>
    <script src="shop-sidebar.js"></script>
    <script src="shop-dashboard.js"></script>
</body>
</html>
